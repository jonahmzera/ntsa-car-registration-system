
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTSA Charges Calculator</title>
</head>
<body>
    <h2>NTSA Vehicle Registration System (Simulation)</h2>
    <h3>Try the System</h3>

<input type="text" id="name" placeholder="Client Name"><br><br>
<input type="number" id="passengers" placeholder="Number of Passengers"><br><br>
<input type="text" id="name" placeholder="Client Name"><br><br>

<button onclick="calculate()">Calculate Charges</button>

<p id="result"></p>

<script>
function calculate() {
    let name = document.getElementById("name").value;
    let passengers = document.getElementById("passengers").value;

    if (passengers <= 0) {
        alert("Enter valid number of passengers");
        return;
    }

    let total = passengers * 1000;

    document.getElementById("result").innerText =
        "Client: " + name +
        "\nPassengers: " + passengers +
        "\nTotal Charges: KES " + total;
}
</script>

</body>
</html>
